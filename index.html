<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Simple AR Box Markerless</title>
</head>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<body>

    <a-scene embedded arjs="SourceType:webcam; facingMode:user; debugUIEnabled:false;" >

        <a-marker typeof="pattern" src="pattern-OIP.patt">
            <a-box position="0 0 -2" rotation="0 45 0" color="green" scale="0.4 0.4 0.4"></a-box>
        </a-marker>
    </a-scene>

</body>
</html>
